<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Gold bar gradient -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#fefcff" stroke="#7c5cbf" stroke-width="2"/>

  <!-- Gold bar shape -->
  <g transform="translate(50, 50)">
    <!-- Main bar -->
    <rect x="-22" y="-28" width="44" height="40" rx="4" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1.5"/>

    <!-- Highlight for shine -->
    <rect x="-20" y="-26" width="40" height="8" rx="2" fill="#FFFF99" opacity="0.6"/>

    <!-- Shadow gradient -->
    <rect x="-22" y="-28" width="44" height="40" rx="4" fill="url(#shadowGradient)" opacity="0.2"/>

    <!-- Bottom accent bar (showing coin) -->
    <circle cx="0" cy="20" r="16" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <circle cx="0" cy="20" r="14" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.7"/>
    <text x="0" y="25" text-anchor="middle" font-size="12" font-weight="bold" fill="#654321">Au</text>
  </g>
</svg>
